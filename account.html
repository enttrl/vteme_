<!DOCTYPE html>
<html lang="ru">
<head>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .account-placeholder {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }

    .account-placeholder__card {
      max-width: 700px;
      width: 100%;
      padding: 48px;
      border-radius: 32px;
      background: #ffffff;
      text-align: center;
    }

    .account-placeholder__title {
      margin: 0 0 16px;
      font-family: "Inter", Arial, sans-serif;
      font-size: 48px;
      font-weight: 700;
    }

    .account-placeholder__text {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      font-size: 22px;
      line-height: 1.3;
      color: #555;
    }
  </style>
</head>
<body>
  <main class="account-placeholder">
    <div class="account-placeholder__card">
      <h1 class="account-placeholder__title">Личный кабинет</h1>

      </p>
      <button id="logoutButton" type="button">Выйти</button>

</body>
